<!doctype html>
<html lang="zh-CN">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ontario Tax Refund Guide | 安省退税计算器</title>
  <meta name="description" content="中英双语安省退税计算器。引导式估算加拿大安省常见退税与福利，支持保存、导出、恢复。" />
  <style>
    :root {
      --bg: #f5f7fb;
      --surface: rgba(255,255,255,.84);
      --surface-solid: #fff;
      --text: #142132;
      --muted: #64748b;
      --line: #e4eaf2;
      --primary: #2563eb;
      --primary-2: #3b82f6;
      --success: #0f9f6e;
      --warning: #d97706;
      --danger: #dc2626;
      --soft-blue: #eaf2ff;
      --soft-green: #eafaf3;
      --soft-yellow: #fff8df;
      --soft-purple: #f4e8ff;
      --shadow: 0 16px 40px rgba(20,33,50,.08);
      --radius: 26px;
      --radius-sm: 16px;
      --max: 1220px;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(96,165,250,.16), transparent 30%),
        radial-gradient(circle at top right, rgba(216,180,254,.18), transparent 24%),
        linear-gradient(180deg, #f9fbff 0%, #f5f7fb 100%);
      min-height: 100vh;
    }
    .wrap {
      max-width: var(--max);
      margin: 0 auto;
      padding: 20px 16px 48px;
    }
    .glass {
      background: var(--surface);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,.72);
      box-shadow: var(--shadow);
      border-radius: 28px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 800;
    }
    .brand-badge {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: #fff;
      display: grid;
      place-items: center;
      box-shadow: 0 10px 24px rgba(37,99,235,.26);
    }
    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .hero {
      display: grid;
      grid-template-columns: 1.15fr .85fr;
      gap: 18px;
      margin-bottom: 18px;
    }
    .hero-main {
      padding: 28px;
      position: relative;
      overflow: hidden;
    }
    .hero-main::after {
      content: "";
      position: absolute;
      right: -34px;
      top: -34px;
      width: 180px;
      height: 180px;
      background: radial-gradient(circle, rgba(59,130,246,.18), transparent 70%);
      pointer-events: none;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--soft-blue);
      color: var(--primary);
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 800;
      margin-bottom: 14px;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 40px;
      line-height: 1.12;
      letter-spacing: -.03em;
    }
    .hero p {
      margin: 0;
      color: var(--muted);
      line-height: 1.8;
      font-size: 15px;
    }
    .hero-side {
      display: grid;
      gap: 16px;
    }
    .mini-card {
      padding: 18px;
      border-radius: 26px;
      background: var(--surface);
      border: 1px solid rgba(255,255,255,.72);
      box-shadow: var(--shadow);
    }
    .mini-card .k {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .mini-card .v {
      font-size: 30px;
      font-weight: 900;
      letter-spacing: -.03em;
    }
    .mini-card .s {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
      margin-top: 6px;
    }
    .main {
      display: grid;
      grid-template-columns: minmax(0, 1.18fr) 380px;
      gap: 18px;
      align-items: start;
    }
    .panel, .sidebar, .marketing {
      padding: 20px;
      border-radius: 28px;
      background: var(--surface);
      border: 1px solid rgba(255,255,255,.72);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }
    .sidebar { position: sticky; top: 14px; }
    .marketing { margin-top: 18px; }
    .progress-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 10px;
    }
    .progress-track {
      width: 100%;
      height: 10px;
      background: #eaf0f8;
      border-radius: 999px;
      overflow: hidden;
    }
    .progress-fill {
      width: 0;
      height: 100%;
      background: linear-gradient(90deg, #60a5fa, #2563eb);
      border-radius: 999px;
      transition: width .25s ease;
    }
    .step-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 16px 0 18px;
    }
    .step-tab {
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid var(--line);
      font-size: 13px;
      color: var(--muted);
      background: rgba(255,255,255,.7);
    }
    .step-tab.active {
      background: var(--soft-blue);
      color: var(--primary);
      border-color: #cfe0ff;
      font-weight: 800;
    }
    .question {
      font-size: 30px;
      line-height: 1.2;
      font-weight: 900;
      letter-spacing: -.03em;
      margin: 8px 0 8px;
    }
    .desc {
      color: var(--muted);
      line-height: 1.8;
      font-size: 15px;
      margin-bottom: 18px;
    }
    .field-grid { display: grid; gap: 14px; }
    .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
    .field {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px;
      background: rgba(255,255,255,.8);
    }
    .field label {
      display: block;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }
    .field small {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      line-height: 1.6;
    }
    input, select, textarea {
      width: 100%;
      border: 1px solid #d9e4f0;
      border-radius: 14px;
      background: #fff;
      padding: 12px 13px;
      font-size: 15px;
      outline: none;
      color: var(--text);
      transition: .15s ease;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(59,130,246,.14);
    }
    .choice-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }
    .choice {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px;
      background: rgba(255,255,255,.78);
      cursor: pointer;
      transition: .15s ease;
    }
    .choice:hover { transform: translateY(-1px); border-color: #bfd6ff; }
    .choice.active {
      border-color: #9bc0ff;
      background: linear-gradient(180deg, #f4f8ff, #eaf2ff);
      box-shadow: inset 0 0 0 1px rgba(37,99,235,.08);
    }
    .choice .title { font-weight: 800; margin-bottom: 5px; }
    .choice .sub { color: var(--muted); font-size: 13px; line-height: 1.6; }
    .actions {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-top: 20px;
      padding-top: 18px;
      border-top: 1px solid rgba(228,234,242,.9);
    }
    .btn {
      border: 0;
      border-radius: 16px;
      padding: 12px 16px;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      transition: .15s ease;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn.primary {
      color: #fff;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      box-shadow: 0 10px 24px rgba(37,99,235,.25);
    }
    .btn.secondary { background: #eef3f9; color: var(--text); }
    .btn.success { background: linear-gradient(135deg, #10b981, #059669); color: #fff; }
    .btn.warning { background: linear-gradient(135deg, #f59e0b, #d97706); color: #fff; }
    .btn.ghost {
      background: rgba(255,255,255,.78);
      color: var(--text);
      border: 1px solid var(--line);
    }
    .side-title {
      margin: 0 0 12px;
      font-size: 19px;
    }
    .summary-list, .result-list, .marketing-list { display: grid; gap: 12px; }
    .sum-item, .result-item, .mark-item {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255,255,255,.8);
      padding: 14px;
    }
    .label { color: var(--muted); font-size: 12px; line-height: 1.55; margin-bottom: 6px; }
    .value { font-size: 20px; font-weight: 900; line-height: 1.3; }
    .muted { color: var(--muted); font-size: 13px; line-height: 1.7; }
    .hero-total {
      background: linear-gradient(135deg, rgba(59,130,246,.08), rgba(16,185,129,.08));
      border: 1px solid #dce9ff;
    }
    .tag {
      display: inline-flex;
      align-items: center;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      margin-left: 8px;
    }
    .tag.green { background: #dcf8e9; color: var(--success); }
    .tag.yellow { background: #fff0c7; color: var(--warning); }
    .tag.blue { background: #e1efff; color: var(--primary); }
    .insight {
      margin-top: 16px;
      border-radius: 18px;
      padding: 14px;
      background: linear-gradient(180deg, #fff, #fafcff);
      border: 1px dashed #d7e1ef;
      color: var(--muted);
      line-height: 1.75;
      font-size: 14px;
    }
    .footer-note {
      margin-top: 18px;
      border-radius: 18px;
      padding: 16px;
      background: #fffdf6;
      border: 1px solid #f5e5b5;
      color: #7a5d16;
      font-size: 13px;
      line-height: 1.75;
    }
    .pill-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
    .pill {
      border-radius: 999px;
      padding: 8px 10px;
      background: #f0f5fb;
      color: #53657c;
      border: 1px solid #dde7f3;
      font-size: 12px;
    }
    .toast {
      position: fixed;
      right: 16px;
      bottom: 16px;
      z-index: 1000;
      background: rgba(20,33,50,.95);
      color: #fff;
      padding: 12px 14px;
      border-radius: 14px;
      font-size: 13px;
      box-shadow: 0 16px 32px rgba(0,0,0,.16);
      opacity: 0;
      transform: translateY(8px);
      pointer-events: none;
      transition: .2s ease;
      max-width: 320px;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    @media (max-width: 1020px) {
      .hero, .main { grid-template-columns: 1fr; }
      .sidebar { position: static; }
    }
    @media (max-width: 760px) {
      h1 { font-size: 31px; }
      .question { font-size: 24px; }
      .row-2, .row-3, .choice-row { grid-template-columns: 1fr; }
      .hero-main, .mini-card, .panel, .sidebar, .marketing { padding: 16px; border-radius: 22px; }
      .wrap { padding: 14px 12px 36px; }
      .toolbar { width: 100%; }
    }
  </style>
</head>

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return { ...defaultState };
        return { ...defaultState, ...JSON.parse(raw) };
      } catch {
        return { ...defaultState };
      }
    }

    function saveState(showToastMessage = false) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      if (showToastMessage) toast(t().toasts.saved);
    }

    function resetState() {
      state = { ...defaultState, lang: state.lang || 'zh' };
      saveState();
      stepIndex = 0;
      renderAll();
      toast(t().toasts.reset);
    }

    function t() { return i18n[state.lang] || i18n.zh; }
    function $(id) { return document.getElementById(id); }
    function money(v) {
      return new Intl.NumberFormat('en-CA', { style: 'currency', currency: 'CAD', maximumFractionDigits: 0 }).format(Math.max(0, v || 0));
    }
    function num(id) { return Number($(id)?.value || 0); }
    function val(id) { return $(id)?.value || ''; }

    function getTaxParams(year) {
      const table = {
        2024: { federalBasic: 15705, ontarioBasic: 12399, fed1: 57375, on1: 51446 },
        2025: { federalBasic: 16129, ontarioBasic: 12747, fed1: 57989, on1: 52886 },
        2023: { federalBasic: 15000, ontarioBasic: 11865, fed1: 53359, on1: 49231 }
      };
      return table[year] || table[2024];
    }

    function totalIncome() { return state.employmentIncome + state.selfEmploymentIncome + state.otherIncome; }
    function familyIncome() { return totalIncome() + (state.maritalStatus === 'married' ? state.spouseIncome : 0); }

    function estimate() {
      const tax = getTaxParams(state.taxYear);
      const income = totalIncome();
      const famIncome = familyIncome();
      const spouse = state.maritalStatus === 'married';

      const rrspDeduction = state.rrsp;
      const childCareDeduction = Math.min(state.childCare, income * 0.66);
      const movingDeduction = state.newcomer === 'yes' ? 0 : Math.min(state.movingExpenses, income * 0.2);
      const adjustedIncome = Math.max(0, income - rrspDeduction - childCareDeduction - movingDeduction);

      let fedTax = 0;
      if (adjustedIncome > tax.federalBasic) {
        fedTax += Math.min(adjustedIncome - tax.federalBasic, tax.fed1 - tax.federalBasic) * 0.15;
        if (adjustedIncome > tax.fed1) fedTax += Math.max(0, adjustedIncome - tax.fed1) * 0.205;
      }

      let onTax = 0;
      if (adjustedIncome > tax.ontarioBasic) {
        onTax += Math.min(adjustedIncome - tax.ontarioBasic, tax.on1 - tax.ontarioBasic) * 0.0505;
        if (adjustedIncome > tax.on1) onTax += Math.max(0, adjustedIncome - tax.on1) * 0.0915;
      }

      const tuitionCredit = state.tuition * 0.15;
      const medicalEligible = Math.max(0, state.medical - Math.min(adjustedIncome * 0.03, 2759));
      const medicalCredit = medicalEligible * 0.15;
      const firstHomeCredit = state.firstHomeBuyer === 'yes' ? 1500 : 0; // planning reminder style, capped simplification
      const nonRefundableCredits = tuitionCredit + medicalCredit + firstHomeCredit;
      const taxAfterCredits = Math.max(0, fedTax + onTax - nonRefundableCredits);
      const refundFromWithheld = Math.max(0, state.taxWithheld - taxAfterCredits);

      let gst = 0;
      if (state.age >= 19 && state.residencyMonths > 0) {
        const base = 340 + (spouse ? 340 : 0) + state.childrenCount * 179;
        const threshold = spouse ? 45000 : 42000;
        const reduction = Math.max(0, (famIncome - threshold) * 0.05);
        gst = Math.max(0, base - reduction);
        if (state.newcomer === 'yes') gst *= 0.8;
      }

      let ostc = 0;
      if (state.age >= 18 && state.residencyMonths > 0) {
        const adults = spouse ? 2 : 1;
        const base = adults * 371 + state.childrenCount * 186;
        const threshold = spouse ? 50000 : 43000;
        const reduction = Math.max(0, (famIncome - threshold) * 0.04);
        ostc = Math.max(0, base - reduction);
      }

      let oeptc = 0;
      if (state.residencyMonths > 0) {
        const occupancyBase = Math.max(state.rentPaid * 0.2, state.propertyTaxPaid * 0.5);
        const cap = state.age >= 65 ? 1500 : 1300;
        const threshold = spouse ? 36000 : 30000;
        const reduction = Math.max(0, (famIncome - threshold) * 0.02);
        oeptc = Math.max(0, Math.min(cap, occupancyBase) - reduction);
        oeptc *= Math.max(0.25, Math.min(1, state.residencyMonths / 12));
      }

      const trillium = ostc + oeptc;

      let cwb = 0;
      if (income > 3000) {
        const max = spouse ? 2800 : 1700;
        const built = Math.min(max, Math.max(0, (income - 3000) * 0.27));
        const threshold = spouse ? 26000 : 24000;
        const reduction = Math.max(0, (famIncome - threshold) * 0.12);
        cwb = Math.max(0, built - reduction);
        if (state.newcomer === 'yes') cwb *= 0.9;
      }

      const total = refundFromWithheld + gst + trillium + cwb;

      return {
        income, famIncome, adjustedIncome, taxAfterCredits, refundFromWithheld,
        gst, ostc, oeptc, trillium, cwb,
        tuitionCredit, medicalCredit, firstHomeCredit,
        childCareDeduction, movingDeduction, total
      };
    }

        if (est.trillium > 0 && (state.rentPaid > 0 || state.propertyTaxPaid > 0)) notes.push('Housing costs are materially increasing your Ontario Trillium estimate.');
        if (state.maritalStatus === 'married' && state.spouseIncome > 0) notes.push('Spousal income is affecting family-income-tested benefits.');
        if (state.rrsp > 0) notes.push('RRSP contributions are reducing estimated taxable income.');

        return notes.slice(0, 3).join(' ') || 'Your result is currently driven mostly by income level, withholding, and family-income-tested benefits.';
      }
      const notes = [];
      if (est.refundFromWithheld > 0) notes.push('你有明显的预扣税退回空间，说明雇主代扣税额高于这次简化估算下的最终税负。');
      if (est.trillium > 0 && (state.rentPaid > 0 || state.propertyTaxPaid > 0)) notes.push('住房成本正在明显拉高你的 Ontario Trillium Benefit。');
      if (state.maritalStatus === 'married' && state.spouseIncome > 0) notes.push('配偶收入正在影响以家庭收入为基础的福利额度。');
      if (state.rrsp > 0) notes.push('RRSP 供款正在降低估算应税收入。');
      if (state.newcomer === 'yes') notes.push('由于你勾选了新移民/首年税务居民，这里采用了更保守的处理方式。');
      return notes.slice(0, 3).join(' ') || '当前结果主要由收入水平、预扣税以及家庭收入型福利共同决定。';
    }

    function escapeHtml(str) {
      return String(str || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

          items.forEach(el => el.classList.remove('active'));
          item.classList.add('active');
          state[item.dataset.key] = item.dataset.value;
          autoSave();
          renderSummaryAndResults();
        });
      });

        <div class="sum-item"><div class="label">${L.resultLabels.income}</div><div class="value">${money(est.income)}</div></div>
        <div class="sum-item"><div class="label">${L.resultLabels.familyIncome}</div><div class="value">${money(est.famIncome)}</div></div>
        <div class="sum-item"><div class="label">${L.resultLabels.adjustedIncome}</div><div class="value">${money(est.adjustedIncome)}</div><div class="muted">RRSP + child care + moving expense (simplified)</div></div>
        <div class="sum-item"><div class="label">${L.resultLabels.withheld}</div><div class="value">${money(state.taxWithheld)}</div></div>
        <div class="sum-item"><div class="label">${L.resultLabels.housing}</div><div class="value">${money(state.rentPaid + state.propertyTaxPaid)}</div></div>
      `;
      $('insightBox').textContent = insightText(est);
      $('resultList').innerHTML = `
        <div class="result-item hero-total">
          <div class="label">${L.resultLabels.total}</div>
          <div class="value" style="font-size:34px;">${money(est.total)}</div>
          <div class="muted">${state.lang === 'zh' ? '这是“可能退回的税 + 现金性福利”的估算合计。' : 'Combined estimate of potential tax refund and cash-like benefits.'}</div>
        </div>
        <div class="result-item">
          <div class="label">${L.resultLabels.refund}<span class="tag ${est.refundFromWithheld>0?'green':'yellow'}">${est.refundFromWithheld>0?L.tags.high:L.tags.limited}</span></div>
          <div class="value">${money(est.refundFromWithheld)}</div>
          <div class="muted">${state.lang === 'zh' ? '预扣税高于最终估算税负时，通常会形成退税。' : 'Refunds often arise when payroll withholding exceeds final estimated tax.'}</div>
        </div>
        <div class="result-item">
          <div class="label">${L.resultLabels.gst}<span class="tag ${est.gst>0?'green':'yellow'}">${est.gst>0?L.tags.likely:L.tags.maybe}</span></div>
          <div class="value">${money(est.gst)}</div>
          <div class="muted">${state.lang === 'zh' ? '按家庭收入简化估算，通常按季度发放。' : 'Simplified family-income estimate, usually paid quarterly.'}</div>
        </div>
        <div class="result-item">
          <div class="label">${L.resultLabels.trillium}<span class="tag ${est.trillium>0?'green':'yellow'}">${est.trillium>0?L.tags.focus:L.tags.low}</span></div>
          <div class="value">${money(est.trillium)}</div>
          <div class="muted">OSTC ≈ ${money(est.ostc)} · OEPTC ≈ ${money(est.oeptc)}</div>
        </div>
        <div class="result-item">
          <div class="label">${L.resultLabels.cwb}<span class="tag ${est.cwb>0?'blue':'yellow'}">${est.cwb>0?L.tags.eligible:L.tags.maybe}</span></div>
          <div class="value">${money(est.cwb)}</div>
          <div class="muted">${state.lang === 'zh' ? '有工作收入但收入不高时，这项可能出现。' : 'May apply when you have working income but modest earnings.'}</div>
        </div>
        <div class="result-item">
          <div class="label">${L.resultLabels.credits}</div>
          <div class="value">${money(est.tuitionCredit + est.medicalCredit + est.firstHomeCredit)}</div>
          <div class="muted">${state.lang === 'zh' ? `学费抵税约 ${money(est.tuitionCredit)}；医疗抵税约 ${money(est.medicalCredit)}；首套房提示抵免约 ${money(est.firstHomeCredit)}。` : `Tuition credit ≈ ${money(est.tuitionCredit)}; medical credit ≈ ${money(est.medicalCredit)}; first-home planning credit ≈ ${money(est.firstHomeCredit)}.`}</div>
        </div>
        <div class="result-item">
          <div class="label">${L.resultLabels.tax}</div>
          <div class="value">${money(est.taxAfterCredits)}</div>
          <div class="muted">${state.lang === 'zh' ? '简化估算，不含完整 T1 细项。' : 'Simplified estimate; not a full T1 return model.'}</div>
        </div>
      `;
    }

    function exportState() {
      collectCurrentStep(false);
      saveState();
      const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `ontario-tax-guide-${state.taxYear}.json`;
      a.click();
      URL.revokeObjectURL(url);
      toast(t().toasts.exported);
    }

    function importState(file) {
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const data = JSON.parse(reader.result);
          state = { ...defaultState, ...data, lang: data.lang || state.lang || 'zh' };
          saveState();
          stepIndex = 0;
          renderAll();
          toast(t().toasts.imported);
        } catch {
          toast('Import failed / 导入失败');
        }
      };
      reader.readAsText(file);
    }

    function toast(msg) {
      const el = $('toast');
      el.textContent = msg;
      el.classList.add('show');
      clearTimeout(window.__toastTimer);
      window.__toastTimer = setTimeout(() => el.classList.remove('show'), 1800);
    }

    function renderAll() {
      renderStaticText();
      renderStep();
      renderSummaryAndResults();
    }

    $('prevBtn').addEventListener('click', () => {
      collectCurrentStep(false);
      if (stepIndex > 0) stepIndex--;
      renderAll();
    });
    $('nextBtn').addEventListener('click', () => {
      collectCurrentStep(false);
      if (stepIndex < steps.length - 1) stepIndex++;
      renderAll();
      autoSave();
    });
    $('langBtn').addEventListener('click', () => {
      state.lang = state.lang === 'zh' ? 'en' : 'zh';
      saveState();
      renderAll();
    });
    $('saveBtn').addEventListener('click', () => {
      collectCurrentStep(false);
      saveState(true);
    });
    $('exportBtn').addEventListener('click', exportState);
    $('importBtn').addEventListener('click', () => $('fileInput').click());
    $('fileInput').addEventListener('change', (e) => {
      const file = e.target.files?.[0];
      if (file) importState(file);
      e.target.value = '';
    });
    $('resetBtn').addEventListener('click', resetState);

    renderAll();
  </script>
</body>
</html>
